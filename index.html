<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Göteborgsvarvet 2026 — Träningsplan</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    /* ─── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #243048;
      --border:    #334155;
      --text:      #e2e8f0;
      --text-muted:#94a3b8;
      --text-dim:  #64748b;

      --green:  #22c55e;
      --blue:   #3b82f6;
      --purple: #8b5cf6;
      --grey:   #475569;
      --amber:  #f59e0b;
      --red:    #ef4444;

      --green-bg:  rgba(34,197,94,.12);
      --blue-bg:   rgba(59,130,246,.12);
      --purple-bg: rgba(139,92,246,.12);
      --grey-bg:   rgba(71,85,105,.15);
      --amber-bg:  rgba(245,158,11,.12);
      --red-bg:    rgba(239,68,68,.12);

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,.4);
    }

    /* ─── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout container ──────────────────────────────────────────── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.25rem 1rem 4rem;
    }

    /* ─── Hero ──────────────────────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1a2744 40%, #1e2d52 70%, #162039 100%);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 1rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(59,130,246,.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(139,92,246,.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
    }

    .hero-label {
      display: inline-block;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--blue-bg);
      border: 1px solid rgba(59,130,246,.25);
      border-radius: var(--radius-sm);
      padding: .2rem .55rem;
      margin-bottom: .85rem;
    }

    .hero-title {
      font-size: clamp(1.75rem, 6vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: .4rem;
    }

    .hero-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1.75rem;
    }

    .hero-countdown {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .countdown-chip {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .6rem 1rem;
      text-align: center;
      min-width: 90px;
    }

    .countdown-num {
      display: block;
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .countdown-unit {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: .2rem;
    }

    .countdown-chip.race-day {
      border-color: var(--amber);
      background: var(--amber-bg);
    }

    .countdown-chip.race-day .countdown-num { color: var(--amber); }
    .countdown-chip.race-day .countdown-unit { color: var(--amber); }

    /* ─── Section wrapper ───────────────────────────────────────────── */
    .section {
      margin-top: 1.5rem;
    }

    .section-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: .75rem;
    }

    /* ─── Cards / surfaces ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
    }

    .card + .card { margin-top: .6rem; }

    /* ─── Progress bars ─────────────────────────────────────────────── */
    .progress-bar-wrap {
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      overflow: hidden;
      height: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--purple) 100%);
      transition: width .5s ease;
      min-width: 2px;
    }

    .progress-bar-fill.green {
      background: linear-gradient(90deg, #16a34a 0%, var(--green) 100%);
    }

    .progress-bar-wrap.thick { height: 12px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: .35rem;
    }

    .progress-label-text {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
    }

    .progress-label-pct {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Stats grid ────────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }

    @media (min-width: 480px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: .9rem 1rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .stat-sub {
      font-size: .75rem;
      color: var(--text-dim);
      margin-top: .1rem;
    }

    /* ─── Day grid (week view) ──────────────────────────────────────── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .35rem;
    }

    @media (max-width: 380px) {
      .day-grid { gap: .2rem; }
    }

    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem .3rem;
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .2rem;
      position: relative;
      transition: border-color .15s, background .15s;
      cursor: default;
    }

    .day-card:hover { border-color: var(--blue); background: var(--surface2); }

    .day-card.done    { border-color: var(--green); background: var(--green-bg); }
    .day-card.planned { border-color: var(--blue);  background: var(--blue-bg); }
    .day-card.missed  { border-color: var(--red);   background: var(--red-bg); }
    .day-card.bonus   { border-color: var(--purple); background: var(--purple-bg); }
    .day-card.rest    { border-color: transparent; background: rgba(255,255,255,.02); }
    .day-card.race    { border-color: var(--amber); background: var(--amber-bg); }
    .day-card.today   { box-shadow: 0 0 0 2px var(--blue); }

    .day-name {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .day-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .day-label {
      font-size: .6rem;
      font-weight: 600;
      color: var(--text-dim);
      line-height: 1.2;
    }

    .day-km {
      font-size: .65rem;
      font-weight: 700;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Badge ─────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: .2rem .5rem;
      border-radius: var(--radius-sm);
    }

    .badge.green  { color: var(--green);  background: var(--green-bg);  border: 1px solid rgba(34,197,94,.3); }
    .badge.blue   { color: var(--blue);   background: var(--blue-bg);   border: 1px solid rgba(59,130,246,.3); }
    .badge.purple { color: var(--purple); background: var(--purple-bg); border: 1px solid rgba(139,92,246,.3); }
    .badge.grey   { color: var(--grey);   background: var(--grey-bg);   border: 1px solid rgba(71,85,105,.3); }
    .badge.amber  { color: var(--amber);  background: var(--amber-bg);  border: 1px solid rgba(245,158,11,.3); }
    .badge.red    { color: var(--red);    background: var(--red-bg);    border: 1px solid rgba(239,68,68,.3); }

    /* ─── Week list rows ────────────────────────────────────────────── */
    .week-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: .9rem 1.1rem;
      margin-bottom: .5rem;
      box-shadow: var(--shadow);
      cursor: default;
      transition: border-color .15s, background .15s;
    }

    .week-row:hover { border-color: var(--blue); background: var(--surface2); }

    .week-row.current-week-row { border-color: var(--blue); }

    .week-row-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: .6rem;
    }

    .week-row-meta {
      flex: 1;
      min-width: 0;
    }

    .week-row-label {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .week-row-subtitle {
      font-size: .78rem;
      color: var(--text-muted);
      margin-top: .1rem;
    }

    .week-row-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .25rem;
      flex-shrink: 0;
    }

    .week-km {
      font-size: .9rem;
      font-weight: 700;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .week-progress-bar {
      width: 100%;
      margin-top: .4rem;
    }

    /* ─── Chart wrapper ─────────────────────────────────────────────── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.2rem;
      box-shadow: var(--shadow);
      position: relative;
    }

    .chart-wrap canvas {
      display: block;
      max-height: 220px;
    }

    /* ─── Current week header ───────────────────────────────────────── */
    .current-week-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }

    .current-week-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .current-week-phase {
      font-size: .72rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ─── Loading / error states ────────────────────────────────────── */
    .loading {
      text-align: center;
      color: var(--text-dim);
      font-size: .9rem;
      padding: 2rem 1rem;
    }

    .error-msg {
      background: var(--red-bg);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      color: var(--red);
      font-size: .85rem;
      margin-top: 1rem;
    }

    /* ─── Utility ───────────────────────────────────────────────────── */
    .flex-row {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
    }

    .text-muted { color: var(--text-muted); }
    .text-dim   { color: var(--text-dim); }
    .text-sm    { font-size: .85rem; }
    .text-xs    { font-size: .75rem; }
    .font-bold  { font-weight: 700; }
    .mt-sm      { margin-top: .4rem; }
    .mt-md      { margin-top: .75rem; }
    .mt-lg      { margin-top: 1.25rem; }

    /* ─── Week row active / expanded states ────────────────────────── */
    .week-row.active {
      border-left: 3px solid var(--blue);
      padding-left: calc(1.1rem - 2px); /* 3px border replaces 1px, net +2px offset */
    }

    .week-row.future {
      opacity: 0.5;
    }

    .week-row { cursor: pointer; }

    .week-row-expand {
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease, padding .3s ease;
    }

    .week-row-expand.open {
      max-height: 600px;
      padding-top: .75rem;
    }

    /* ─── Mini progress bar ─────────────────────────────────────────── */
    .mini-bar-wrap {
      width: 70px;
      height: 5px;
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .mini-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--purple) 100%);
      min-width: 2px;
    }

    /* ─── Footer ────────────────────────────────────────────────────── */
    .page-footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .page-footer p {
      font-size: .78rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .page-footer p + p {
      margin-top: .1rem;
    }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .container { padding: 0 .75rem 3rem; }
      .card { padding: .9rem 1rem; }
      .week-row { padding: .8rem .9rem; }
      .hero { padding: 2rem .75rem 1.75rem; }
      .countdown-chip { min-width: 78px; padding: .5rem .8rem; }
      .countdown-num { font-size: 1.6rem; }
      .day-card { padding: .4rem .2rem; min-height: 64px; }
      .day-name { font-size: .58rem; }
      .day-icon { font-size: 1rem; }
      .chart-height { height: 200px !important; }
    }

    @media (max-width: 380px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .hero-title { font-size: 1.6rem; }
      .hero-countdown { gap: .5rem; }
      .countdown-chip { min-width: 68px; padding: .45rem .6rem; }
      .countdown-num { font-size: 1.4rem; }
      .day-card { min-height: 58px; }
      .day-name-short { display: inline; }
      .day-name-full  { display: none; }
      .chart-height { height: 180px !important; }
    }

    .chart-height { height: 250px; }

    /* Default: show full, hide short */
    .day-name-short { display: none; }
    .day-name-full  { display: inline; }
  </style>
</head>
<body>

  <!-- ─── Hero ──────────────────────────────────────────────────────── -->
  <header class="hero">
    <div class="hero-inner">
      <span class="hero-label">Träningsplan</span>
      <h1 class="hero-title">Göteborgsvarvet 2026</h1>
      <p class="hero-subtitle">21.1 km — Lördag 23 maj</p>
      <div class="hero-countdown" id="hero-countdown">
        <!-- Populated by renderHero() -->
      </div>
    </div>
  </header>

  <!-- ─── Main content ──────────────────────────────────────────────── -->
  <main class="container">

    <!-- Progress overview -->
    <section class="section" id="progress">
      <p class="loading">Laddar...</p>
    </section>

    <!-- Stats -->
    <section class="section" id="stats"></section>

    <!-- Current week -->
    <section class="section" id="current-week"></section>

    <!-- All weeks -->
    <section class="section" id="all-weeks"></section>

    <!-- Chart -->
    <section class="section" id="chart"></section>

    <!-- Footer -->
    <footer class="page-footer" id="page-footer"></footer>

  </main>

  <!-- ─── JS ───────────────────────────────────────────────────────── -->
  <script>
    // ─── Helper functions ─────────────────────────────────────────────

    /**
     * Find which week object a given date falls in.
     * Each week spans start_date through start_date + 6 days.
     */
    function getWeekForDate(plan, date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      for (const week of plan.weeks) {
        const start = new Date(week.start_date);
        start.setHours(0, 0, 0, 0);
        const end = new Date(start);
        end.setDate(end.getDate() + 6);
        end.setHours(23, 59, 59, 999);
        if (d >= start && d <= end) return week;
      }
      return null;
    }

    /**
     * Returns the lowercase 3-letter day key for a date: "mon", "tue", etc.
     */
    function getDayKey(date) {
      const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
      const d = new Date(date);
      return days[d.getDay()];
    }

    /**
     * Returns all logged workouts for a given planned week id.
     */
    function getWorkoutsForWeek(workouts, weekId) {
      return workouts.filter(w => w.planned_week === weekId);
    }

    /**
     * Returns bonus workouts (planned_week === null) that fall within
     * the 7-day range starting at weekStartDate.
     */
    function getBonusWorkoutsForWeek(workouts, weekId, weekStartDate) {
      const start = new Date(weekStartDate);
      start.setHours(0, 0, 0, 0);
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      end.setHours(23, 59, 59, 999);
      return workouts.filter(w => {
        if (w.planned_week !== null) return false;
        const wd = new Date(w.date);
        return wd >= start && wd <= end;
      });
    }

    /**
     * Counts non-null, non-rest sessions planned in a week.
     */
    function countPlannedSessions(week) {
      return Object.values(week.days).filter(
        d => d !== null && d.type !== 'rest'
      ).length;
    }

    /**
     * Counts logged workouts that belong to a specific planned week.
     */
    function countCompletedPlanned(workouts, weekId) {
      return workouts.filter(w => w.planned_week === weekId).length;
    }

    /**
     * Returns true if the given date string (YYYY-MM-DD) is strictly in the past.
     */
    function isDatePassed(dateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const d = new Date(dateStr);
      d.setHours(0, 0, 0, 0);
      return d < today;
    }

    /**
     * Formats a YYYY-MM-DD date string for display (e.g. "19 mar").
     */
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
    }

    /**
     * Returns a local-timezone YYYY-MM-DD string for the given Date object.
     * Using toISOString() would return UTC and can be off by a day between
     * midnight and 02:00 in Sweden (UTC+1/+2).
     */
    function toDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    /**
     * Calculates adherence stats shared by renderProgress and renderStats.
     * Returns { Y (elapsed planned sessions), X (completed planned), pct }.
     */
    function calcAdherence(plan, workouts) {
      const DAY_KEYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let Y = 0;
      for (const week of plan.weeks) {
        const weekStart = new Date(week.start_date);
        weekStart.setHours(0, 0, 0, 0);
        if (weekStart > today) continue;
        DAY_KEYS.forEach((key, idx) => {
          const day = week.days[key];
          if (!day || day.type === 'rest') return;
          const dayDate = new Date(weekStart);
          dayDate.setDate(weekStart.getDate() + idx);
          dayDate.setHours(0, 0, 0, 0);
          if (dayDate <= today) Y++;
        });
      }

      const X = workouts.filter(w => w.planned_week !== null).length;
      const pct = Y > 0 ? Math.round(X / Y * 100) : 0;
      return { elapsed: Y, completed: X, pct };
    }

    // ─── Render: Hero ─────────────────────────────────────────────────

    function renderHero(plan) {
      const raceDate = new Date(plan.race.date);
      raceDate.setHours(0, 0, 0, 0);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const msLeft = raceDate - today;
      const daysLeft = Math.max(0, Math.ceil(msLeft / (1000 * 60 * 60 * 24)));
      const weeksLeft = Math.floor(daysLeft / 7);
      const extraDays = daysLeft % 7;

      const el = document.getElementById('hero-countdown');
      if (daysLeft <= 0) {
        el.innerHTML = `
          <div class="countdown-chip race-day">
            <span class="countdown-num">IDAG</span>
            <span class="countdown-unit">Race day!</span>
          </div>`;
        return;
      }

      let html = '';
      if (weeksLeft > 0) {
        html += `
          <div class="countdown-chip">
            <span class="countdown-num">${weeksLeft}</span>
            <span class="countdown-unit">${weeksLeft === 1 ? 'vecka' : 'veckor'}</span>
          </div>`;
      }
      if (extraDays > 0 || weeksLeft === 0) {
        html += `
          <div class="countdown-chip">
            <span class="countdown-num">${extraDays}</span>
            <span class="countdown-unit">${extraDays === 1 ? 'dag' : 'dagar'}</span>
          </div>`;
      }
      html += `
        <div class="countdown-chip race-day">
          <span class="countdown-num">${daysLeft}</span>
          <span class="countdown-unit">totalt</span>
        </div>`;

      el.innerHTML = html;
    }

    // ─── Render stubs ─────────────────────────────────────────────────

    function renderProgress(plan, workouts) {
      const { elapsed: Y, completed: X, pct: Z } = calcAdherence(plan, workouts);

      const el = document.getElementById('progress');
      el.innerHTML = `
        <p class="section-title">ÖVERGRIPANDE FRAMSTEG</p>
        <div class="flex-between" style="margin-bottom:.5rem;">
          <span class="text-sm text-muted">Total framsteg</span>
          <span class="text-sm font-bold">${X} av ${Y} pass klara (${Z}%)</span>
        </div>
        <div class="progress-bar-wrap thick">
          <div class="progress-bar-fill" style="width:${Math.min(Z, 100)}%"></div>
        </div>`;
    }

    function renderStats(plan, workouts) {
      const { pct: adherencePct } = calcAdherence(plan, workouts);

      // Sum of all distance_km (all workouts, including bonus)
      const totalKm = workouts.reduce((sum, w) => sum + (w.distance_km || 0), 0);
      const totalKmDisplay = Number.isInteger(totalKm) ? totalKm : totalKm.toFixed(1);

      // Total count of all logged workouts
      const totalWorkouts = workouts.length;

      // Count gym workouts
      const gymCount = workouts.filter(w => w.type === 'gym').length;

      const el = document.getElementById('stats');
      el.innerHTML = `
        <p class="section-title">STATISTIK</p>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value">${totalKmDisplay}</span>
            <span class="stat-label">Km löpt</span>
          </div>
          <div class="stat-card">
            <span class="stat-value">${totalWorkouts}</span>
            <span class="stat-label">Pass klara</span>
          </div>
          <div class="stat-card">
            <span class="stat-value">${gymCount}</span>
            <span class="stat-label">Gympass</span>
          </div>
          <div class="stat-card">
            <span class="stat-value">${adherencePct}%</span>
            <span class="stat-label">Följsamhet</span>
          </div>
        </div>`;
    }

    /**
     * Given a week object and all workouts, builds the 7-day grid HTML
     * and inserts it into `container` (a DOM element).
     * Also returns counts: { completed, planned, bonus }
     */
    function renderDayGrid(week, workouts, container) {
      const DAY_KEYS   = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
      const DAY_LABELS = ['MÅN', 'TIS', 'ONS', 'TOR', 'FRE', 'LÖR', 'SÖN'];
      const DAY_ABBREV = ['M',   'T',   'O',   'T',   'F',   'L',   'S'];

      const todayStr = toDateStr(new Date());

      // Compute Monday of the calendar week that contains start_date.
      // This ensures day indices map to actual Mon–Sun regardless of
      // what day of the week start_date falls on.
      const sd = new Date(week.start_date);
      sd.setHours(0, 0, 0, 0);
      // getDay(): 0=Sun, 1=Mon, …, 6=Sat
      const sdDow = sd.getDay(); // day-of-week of start_date
      const daysFromMon = (sdDow === 0) ? 6 : sdDow - 1; // distance back to Monday
      const monday = new Date(sd);
      monday.setDate(sd.getDate() - daysFromMon);

      let completedCount = 0;
      let plannedCount   = 0;
      let bonusCount     = 0;

      let html = '<div class="day-grid">';

      DAY_KEYS.forEach((key, idx) => {
        const dayDate = new Date(monday);
        dayDate.setDate(monday.getDate() + idx);
        const dayStr = toDateStr(dayDate);

        const planDay = week.days[key] ?? null;
        const isToday = (dayStr === todayStr);

        // Look for a completed planned workout for this day
        const completedWorkout = workouts.find(
          w => w.planned_week === week.id && w.planned_day === key
        );

        // Look for a bonus workout on this exact date
        const bonusWorkout = workouts.find(
          w => w.planned_week === null && w.date === dayStr
        );

        let stateClass = '';
        let iconHtml   = '';
        let labelHtml  = '';
        let badge      = '';

        if (planDay === null) {
          if (bonusWorkout) {
            // Bonus workout on a day with no plan entry
            bonusCount++;
            const km = bonusWorkout.distance_km;
            const kmDisplay = Number.isInteger(km) ? km : km.toFixed(1);
            stateClass = 'bonus';
            iconHtml   = `<span class="day-icon">★</span>`;
            labelHtml  = `<span class="day-km">${kmDisplay} km</span>`;
          } else {
            // No plan entry and no bonus — dimmed blank
            stateClass = '';
            iconHtml   = `<span class="day-icon" style="color:var(--text-dim)">—</span>`;
            labelHtml  = '';
          }
        } else if (planDay.type === 'rest') {
          if (bonusWorkout) {
            // Bonus session on a rest day
            bonusCount++;
            const km = bonusWorkout.distance_km;
            const kmDisplay = Number.isInteger(km) ? km : km.toFixed(1);
            stateClass = 'bonus';
            iconHtml   = `<span class="day-icon">★</span>`;
            labelHtml  = `<span class="day-km">${kmDisplay} km</span>`;
          } else {
            stateClass = 'rest';
            iconHtml   = `<span class="day-icon" style="color:var(--text-dim); font-size:.75rem;">Vila</span>`;
            labelHtml  = '';
          }
        } else if (planDay.type === 'race') {
          // Race day — never mark as missed; use amber styling
          plannedCount++;
          if (completedWorkout) {
            completedCount++;
            const km = completedWorkout.distance_km;
            const kmDisplay = km ? (Number.isInteger(km) ? km : km.toFixed(1)) : '';
            stateClass = 'done';
            iconHtml   = `<span class="day-icon" style="color:var(--green)">✓</span>`;
            labelHtml  = kmDisplay ? `<span class="day-km">${kmDisplay} km</span>` : '';
          } else {
            // Upcoming or today — amber race styling, never "missed"
            stateClass = isToday ? 'race today' : 'race';
            iconHtml   = `<span class="day-icon" style="color:var(--amber)">🏁</span>`;
            labelHtml  = '';
            if (isToday) {
              badge = `<span class="badge amber" style="font-size:.55rem; padding:.1rem .3rem;">IDAG</span>`;
            }
          }
        } else {
          // Planned session (running, gym, long_run, tempo, …)
          plannedCount++;
          if (completedWorkout) {
            // Completed planned session
            completedCount++;
            const km = completedWorkout.distance_km;
            const kmDisplay = km ? (Number.isInteger(km) ? km : km.toFixed(1)) : '';
            stateClass = 'done';
            iconHtml   = `<span class="day-icon" style="color:var(--green)">✓</span>`;
            labelHtml  = kmDisplay ? `<span class="day-km">${kmDisplay} km</span>` : '';
          } else if (isDatePassed(dayStr)) {
            // Missed — date has passed with no workout logged
            stateClass = 'missed';
            iconHtml   = `<span class="day-icon" style="color:var(--red)">!</span>`;
            labelHtml  = '';
          } else {
            // Planned — future (or today)
            stateClass = isToday ? 'planned today' : 'planned';
            const km = planDay.distance_km;
            const kmDisplay = km ? (Number.isInteger(km) ? km : km.toFixed(1)) : '';
            iconHtml = kmDisplay
              ? `<span class="day-km" style="font-size:.8rem; font-weight:700;">${kmDisplay} km</span>`
              : `<span class="day-label">${planDay.description ? planDay.description.slice(0, 12) : ''}</span>`;
            if (isToday) {
              badge = `<span class="badge blue" style="font-size:.55rem; padding:.1rem .3rem;">IDAG</span>`;
            }
            labelHtml = '';
          }
        }

        html += `
          <div class="day-card ${stateClass}">
            <span class="day-name"><span class="day-name-full">${DAY_LABELS[idx]}</span><span class="day-name-short">${DAY_ABBREV[idx]}</span></span>
            ${iconHtml}
            ${labelHtml}
            ${badge}
          </div>`;
      });

      html += '</div>';
      container.innerHTML = html;

      return { completed: completedCount, planned: plannedCount, bonus: bonusCount };
    }

    function renderCurrentWeek(plan, workouts) {
      const todayStr = toDateStr(new Date());
      const week = getWeekForDate(plan, todayStr);

      const el = document.getElementById('current-week');
      if (!week) {
        el.innerHTML = '';
        return;
      }

      // Build the date-range label, e.g. "19 mar – 25 mar"
      const startDate = new Date(week.start_date);
      const endDate   = new Date(startDate);
      endDate.setDate(startDate.getDate() + 6);
      const dateRange = `${formatDate(week.start_date)} – ${formatDate(toDateStr(endDate))}`;

      // Render the section title row
      el.innerHTML = `
        <p class="section-title">Aktuell vecka</p>
        <div class="card">
          <div class="current-week-header">
            <div>
              <div class="current-week-title">${week.label}</div>
              <div class="current-week-phase">${dateRange} · ${week.phase} · Mål: ${week.total_km} km</div>
            </div>
            <span class="badge blue">PÅGÅR</span>
          </div>
          <div id="current-week-grid"></div>
          <div id="current-week-count" class="text-sm text-muted mt-sm"></div>
        </div>`;

      const gridContainer = document.getElementById('current-week-grid');
      const counts = renderDayGrid(week, workouts, gridContainer);

      // Count line
      const countEl = document.getElementById('current-week-count');
      let countText = `${counts.completed}/${counts.planned} pass`;
      if (counts.bonus > 0) countText += ` + ${counts.bonus} extra`;
      countEl.textContent = countText;
    }

    function renderAllWeeks(plan, workouts) {
      const el = document.getElementById('all-weeks');
      if (!el) return;

      const todayStr = toDateStr(new Date());
      const currentWeek = getWeekForDate(plan, todayStr);
      const currentWeekId = currentWeek ? currentWeek.id : null;

      // Determine which week is expanded by default (current week)
      let expandedWeekId = currentWeekId;

      // Build section header
      let html = '<p class="section-title">ALLA VECKOR</p>';

      plan.weeks.forEach((week, i) => {
        const weekStart = new Date(week.start_date);
        weekStart.setHours(0, 0, 0, 0);

        const weekEndDate = new Date(weekStart);
        weekEndDate.setDate(weekStart.getDate() + 6);
        weekEndDate.setHours(23, 59, 59, 999);

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const isCurrent = (week.id === currentWeekId);
        const isPast    = !isCurrent && weekEndDate < today;
        const isFuture  = !isCurrent && !isPast;

        // Counts
        const plannedSessions = countPlannedSessions(week);
        const completedPlanned = countCompletedPlanned(workouts, week.id);
        const bonusForWeek = getBonusWorkoutsForWeek(workouts, week.id, week.start_date).length;

        // Right-side text
        let rightText = '';
        let pct = 0;
        if (isFuture) {
          rightText = `<span class="week-km">${week.total_km} km</span>`;
        } else {
          // current or past
          let countText = `${completedPlanned}/${plannedSessions}`;
          if (bonusForWeek > 0) countText += ` + ${bonusForWeek} extra`;
          rightText = `<span class="week-km">${countText}</span>`;
          pct = plannedSessions > 0 ? Math.min(Math.round(completedPlanned / plannedSessions * 100), 100) : 0;
        }

        // Mini progress bar (only for current/past)
        const miniBar = (!isFuture) ? `
          <div class="mini-bar-wrap">
            <div class="mini-bar-fill" style="width:${pct}%"></div>
          </div>` : '';

        // Row state classes
        const rowStateClass = isCurrent ? 'active' : (isFuture ? 'future' : '');

        const isExpanded = (week.id === expandedWeekId);

        html += `
          <div class="week-row ${rowStateClass}" data-week-id="${week.id}">
            <div class="week-row-header">
              <div class="week-row-meta">
                <div class="week-row-label">${week.label}</div>
                <div class="week-row-subtitle">${week.subtitle || week.phase}</div>
              </div>
              <div class="week-row-right">
                ${rightText}
                ${miniBar}
              </div>
            </div>
            <div class="week-row-expand${isExpanded ? ' open' : ''}" id="week-expand-${week.id}"></div>
          </div>`;
      });

      el.innerHTML = html;

      // Render the default expanded week's grid
      if (expandedWeekId) {
        const defaultWeek = plan.weeks.find(w => w.id === expandedWeekId);
        if (defaultWeek) {
          const defaultContainer = document.getElementById(`week-expand-${expandedWeekId}`);
          if (defaultContainer) {
            renderDayGrid(defaultWeek, workouts, defaultContainer);
          }
        }
      }

      // Attach click handlers
      el.querySelectorAll('.week-row').forEach(row => {
        row.addEventListener('click', () => {
          const clickedId = row.dataset.weekId;
          const clickedExpandEl = document.getElementById(`week-expand-${clickedId}`);
          const isAlreadyOpen = clickedExpandEl.classList.contains('open');

          // Collapse all expanded rows
          el.querySelectorAll('.week-row-expand.open').forEach(exp => {
            exp.classList.remove('open');
          });

          if (!isAlreadyOpen) {
            // Expand the clicked row, render its grid if not yet rendered
            const weekObj = plan.weeks.find(w => w.id === clickedId);
            if (weekObj && clickedExpandEl.children.length === 0) {
              renderDayGrid(weekObj, workouts, clickedExpandEl);
            }
            clickedExpandEl.classList.add('open');
          }
        });
      });
    }

    function renderChart(plan, workouts) {
      const el = document.getElementById('chart');

      // X-axis labels
      const labels = ['Intro', 'V1', 'V2', 'V3', 'V4', 'V5', 'V6', 'V7', 'V8', 'V9'];

      // Planned km per week (from plan.weeks[].total_km)
      const plannedKm = plan.weeks.map(week => week.total_km);

      // Actual km per week (sum of planned + bonus workouts)
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const actualKm = plan.weeks.map(week => {
        const weekStart = new Date(week.start_date);
        weekStart.setHours(0, 0, 0, 0);
        // For future weeks return 0
        if (weekStart > today) return 0;

        const planned = getWorkoutsForWeek(workouts, week.id);
        const bonus   = getBonusWorkoutsForWeek(workouts, week.id, week.start_date);
        const all     = [...planned, ...bonus];
        return all.reduce((sum, w) => sum + (w.distance_km || 0), 0);
      });

      el.innerHTML = `
        <p class="section-title">KILOMETERVOLYM</p>
        <div class="chart-wrap">
          <div class="chart-height" style="position:relative;">
            <canvas id="volumeChart"></canvas>
          </div>
        </div>
      `;

      const ctx = document.getElementById('volumeChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Planerat',
              data: plannedKm,
              backgroundColor: 'rgba(59, 130, 246, 0.2)',
              borderColor: 'rgba(59, 130, 246, 0.6)',
              borderWidth: 2,
              borderDash: [5, 5],
              borderRadius: 4,
              order: 2
            },
            {
              label: 'Genomfört',
              data: actualKm,
              backgroundColor: '#3b82f6',
              borderColor: '#3b82f6',
              borderWidth: 0,
              borderRadius: 4,
              order: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: '#94a3b8',
                boxWidth: 12,
                padding: 16,
                borderWidth: 0
              }
            },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.9)',
              titleColor: '#94a3b8',
              bodyColor: '#e2e8f0',
              borderColor: 'rgba(255, 255, 255, 0.1)',
              borderWidth: 1,
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} km`
              }
            }
          },
          scales: {
            x: {
              grid: {
                color: 'rgba(255, 255, 255, 0.06)'
              },
              ticks: {
                color: '#64748b'
              },
              border: {
                display: false
              }
            },
            y: {
              grid: {
                color: 'rgba(255, 255, 255, 0.06)'
              },
              ticks: {
                color: '#64748b'
              },
              border: {
                display: false
              }
            }
          }
        }
      });
    }

    // ─── Render: Footer ───────────────────────────────────────────────

    function renderFooter(workouts) {
      const el = document.getElementById('page-footer');
      if (!el) return;

      // Find the date of the most recent workout
      let lastDateStr = null;
      if (workouts.length > 0) {
        const sorted = [...workouts].sort((a, b) => a.date < b.date ? 1 : -1);
        lastDateStr = sorted[0].date;
      }

      const lastUpdated = lastDateStr
        ? new Date(lastDateStr).toLocaleDateString('sv-SE', { year: 'numeric', month: 'long', day: 'numeric' })
        : '–';

      el.innerHTML = `
        <p>Träningsplan för Göteborgsvarvet 2026</p>
        <p>Senast uppdaterad: ${lastUpdated}</p>`;
    }

    // ─── Main render orchestrator ─────────────────────────────────────

    function render(plan, workouts) {
      renderHero(plan);
      renderProgress(plan, workouts);
      renderStats(plan, workouts);
      renderCurrentWeek(plan, workouts);
      renderAllWeeks(plan, workouts);
      renderChart(plan, workouts);
      renderFooter(workouts);
    }

    // ─── Bootstrap: fetch data ────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      Promise.all([
        fetch('plan.json').then(r => {
          if (!r.ok) throw new Error(`plan.json: ${r.status}`);
          return r.json();
        }),
        fetch('workouts.json').then(r => {
          if (!r.ok) throw new Error(`workouts.json: ${r.status}`);
          return r.json();
        })
      ])
        .then(([plan, workouts]) => {
          render(plan, workouts);
        })
        .catch(err => {
          console.error('Failed to load data:', err);
          document.getElementById('progress').innerHTML =
            `<div class="error-msg">Kunde inte ladda data: ${err.message}</div>`;
        });
    });
  </script>
</body>
</html>
